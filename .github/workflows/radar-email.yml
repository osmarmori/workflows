name: Radar Email 2x por semana

on:
  schedule:
    # 08:30 em São Paulo
    # Terça e sexta no horário de Brasília:
    # 11:30 UTC quando Brasília está em UTC-3
    - cron: "30 11 * * 2,5"
  workflow_dispatch:

jobs:
  enviar-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Rodar radar
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          SENHA_APP: ${{ secrets.SENHA_APP }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python main.py
